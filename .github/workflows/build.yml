name: Build Debian Packages

on:
  push:
    branches: [main, 'reishoku', 'release/*']
    tags: ['v*']
  pull_request:
    branches: [main, reishoku]
  workflow_dispatch:

jobs:
  build-ubuntu:
    name: Build on Ubuntu (Runner OS)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Get version from changelog
      id: version
      run: |
        VERSION=$(head -1 debian/changelog | grep -oP '\(\K[^)]+' | cut -d- -f1)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Download and extract upstream source
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        curl -fsSL -o rpmdevtools-${VERSION}.tar.xz \
          "https://releases.pagure.org/rpmdevtools/rpmdevtools-${VERSION}.tar.xz"
        if [ ! -f "rpmdevtools-${VERSION}.tar.xz" ]; then
          echo "ERROR: Failed to download upstream source"
          exit 1
        fi
        tar xf rpmdevtools-${VERSION}.tar.xz
        cp -r debian rpmdevtools-${VERSION}/

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends --no-install-suggests \
          debhelper \
          dh-autoreconf \
          dh-python \
          help2man \
          perl \
          python3 \
          python3-progressbar2 \
          python3-requests \
          python3-rpm \
          bash-completion \
          devscripts \
          fakeroot

    - name: Build package
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        cd rpmdevtools-${VERSION}
        debuild -us -uc -b

  build-debian:
    name: Build for Debian ${{ matrix.debian }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - debian: "12"
          codename: "bookworm"
          arch: "amd64"
          runner: "ubuntu-latest"
        - debian: "12"
          codename: "bookworm"
          arch: "arm64"
          runner: "ubuntu-latest-arm"
        - debian: "13"
          codename: "trixie"
          arch: "amd64"
          runner: "ubuntu-latest"
        - debian: "13"
          codename: "trixie"
          arch: "arm64"
          runner: "ubuntu-latest-arm"

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Get version from changelog
      id: version
      run: |
        VERSION=$(head -1 debian/changelog | grep -oP '\(\K[^)]+' | cut -d- -f1)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Download upstream source
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        curl -fsSL -o rpmdevtools-${VERSION}.tar.xz \
          "https://releases.pagure.org/rpmdevtools/rpmdevtools-${VERSION}.tar.xz"
        if [ ! -f "rpmdevtools-${VERSION}.tar.xz" ]; then
          echo "ERROR: Failed to download upstream source"
          exit 1
        fi

    - name: Build in Debian container
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        docker run --rm -v "$PWD":/workspace -w /workspace \
          debian:${{ matrix.codename }} \
          bash -c "
            set -ex
            apt-get update
            apt-get install -y --no-install-recommends --no-install-suggests \
              debhelper \
              dh-autoreconf \
              dh-python \
              help2man \
              perl \
              python3 \
              python3-progressbar2 \
              python3-requests \
              python3-rpm \
              bash-completion \
              devscripts \
              fakeroot \
              xz-utils
            tar xf rpmdevtools-${VERSION}.tar.xz
            cp -r debian rpmdevtools-${VERSION}/
            cd rpmdevtools-${VERSION}
            debuild -us -uc -b
          "
