name: Build Debian Packages

on:
  push:
    branches: [main, reishoku]
  pull_request:
    branches: [main, reishoku]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.codename }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bookworm
            arch: amd64
            runner: ubuntu-latest
          - codename: bookworm
            arch: arm64
            runner: ubuntu-24.04-arm
          - codename: trixie
            arch: amd64
            runner: ubuntu-latest
          - codename: trixie
            arch: arm64
            runner: ubuntu-24.04-arm
          - codename: noble
            arch: amd64
            runner: ubuntu-latest
          - codename: noble
            arch: arm64
            runner: ubuntu-24.04-arm
          - codename: questing
            arch: amd64
            runner: ubuntu-latest
          - codename: questing
            arch: arm64
            runner: ubuntu-24.04-arm

    env:
      DEBIAN_FRONTEND: noninteractive
      UPSTREAM_URL: https://releases.pagure.org/rpmdevtools

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install devscripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends devscripts > /dev/null

      - name: Get version from changelog
        id: version
        run: |
          VERSION=$(head -1 debian/changelog | sed 's/.*(\(.*\)).*/\1/' | cut -d- -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download upstream source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -fsSL -o "rpmdevtools-${VERSION}.tar.xz" \
            "${UPSTREAM_URL}/rpmdevtools-${VERSION}.tar.xz"

      - name: Build package
        run: ./build.sh ${{ matrix.codename }}

      - name: Verify package contents
        run: dpkg -c ${{ matrix.codename }}/rpmdevtools_*.deb
