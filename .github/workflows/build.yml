name: Build Debian Packages

on:
  push:
    branches: [main, 'reishoku', 'release/*']
    tags: ['v*']
  pull_request:
    branches: [main, reishoku]
  workflow_dispatch:

jobs:
  build:
    name: Build for Debian ${{ matrix.debian }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:${{ matrix.codename }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - debian: "12"
          codename: "bookworm"
          arch: "amd64"
          runner: "ubuntu-latest"
        - debian: "12"
          codename: "bookworm"
          arch: "arm64"
          runner: "ubuntu-latest-arm"
        - debian: "13"
          codename: "trixie"
          arch: "amd64"
          runner: "ubuntu-latest"
        - debian: "13"
          codename: "trixie"
          arch: "arm64"
          runner: "ubuntu-latest-arm"

    steps:
    - name: Install prerequisites
      run: |
        apt-get update
        apt-get install -y --no-install-recommends --no-install-suggests \
          ca-certificates \
          curl \
          git

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Get version from changelog
      id: version
      run: |
        VERSION=$(head -1 debian/changelog | grep -oP '\(\K[^)]+' | cut -d- -f1)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Download upstream source
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        curl -fsSL -o rpmdevtools-${VERSION}.tar.xz \
          "https://releases.pagure.org/rpmdevtools/rpmdevtools-${VERSION}.tar.xz"
        if [ ! -f "rpmdevtools-${VERSION}.tar.xz" ]; then
          echo "ERROR: Failed to download upstream source"
          exit 1
        fi

    - name: Install build dependencies
      run: |
        apt-get install -y --no-install-recommends --no-install-suggests \
          debhelper \
          dh-autoreconf \
          dh-python \
          help2man \
          perl \
          python3 \
          python3-progressbar2 \
          python3-requests \
          python3-rpm \
          rpm \
          bash-completion \
          devscripts \
          fakeroot \
          xz-utils \
          build-essential \
          pkg-config \
          python-is-python3

    - name: Build package
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        tar xf rpmdevtools-${VERSION}.tar.xz
        cp -r debian rpmdevtools-${VERSION}/
        cd rpmdevtools-${VERSION}
        debuild -us -uc -b
